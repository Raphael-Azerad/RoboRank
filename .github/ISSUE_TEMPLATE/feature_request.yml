name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please share the problem you're trying to solve, not just the solution you have in mind — that helps a lot.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: At competitions, I waste 20 minutes every match cycle looking up partner team stats by hand.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      placeholder: A "live match" view that auto-shows my next match's alliance partners and their RoboRank scores.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: How do you currently work around it?
      placeholder: I open RobotEvents.com in another tab and copy stats into a Google Sheet.

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Mockups, similar features in other tools, screenshots — all welcome.
